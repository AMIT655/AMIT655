<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="52" viewBox="0 0 1280 52" fill="none" role="img" aria-label="section separator">
  <defs>
    <radialGradient id="oglow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- soft pulsing glow -->
  <circle cx="640" cy="26" r="30" fill="url(#oglow)" opacity="0.3">
    <animate attributeName="opacity" values="0.16;0.4;0.16" dur="4s" repeatCount="indefinite"/>
  </circle>

  <!-- orbiting teal ring + satellite (echoes the hero monogram's orbit) -->
  <g>
    <circle cx="640" cy="26" r="20" fill="none" stroke="#5eead4" stroke-opacity="0.32" stroke-width="1.2" stroke-dasharray="2 7"/>
    <circle cx="660" cy="26" r="2.6" fill="#5eead4"/>
    <animateTransform attributeName="transform" type="rotate" from="0 640 26" to="360 640 26" dur="26s" repeatCount="indefinite"/>
  </g>

  <!-- dark node: dark fill keeps it visible on GitHub light mode; the teal
       ring + center dot keep it visible on dark mode -->
  <circle cx="640" cy="26" r="11" fill="#0a0b0d" stroke="#5eead4" stroke-opacity="0.6" stroke-width="1.4"/>
  <circle cx="640" cy="26" r="2.6" fill="#5eead4">
    <animate attributeName="opacity" values="1;0.4;1" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>
