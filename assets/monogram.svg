<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160" viewBox="0 0 160 160" fill="none" role="img" aria-label="Amit Suissa monogram">
  <defs>
    <style>
      @font-face{font-family:'Space Grotesk';font-style:normal;font-weight:700;src:url(data:font/woff2;base64,) format('woff2');}
      .m{font-family:'Space Grotesk',sans-serif;font-weight:700;letter-spacing:-.03em}
    </style>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#11181a"/>
      <stop offset="1" stop-color="#0a0b0d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <circle cx="80" cy="80" r="70" fill="url(#glow)" opacity="0.6">
    <animate attributeName="opacity" values="0.4;0.75;0.4" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <rect x="22" y="22" width="116" height="116" rx="30" fill="url(#card)" stroke="#5eead4" stroke-opacity="0.4"/>
  <rect x="22.5" y="22.5" width="115" height="115" rx="29.5" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>
  <text x="80" y="84" class="m" font-size="62" fill="#5eead4" text-anchor="middle" dominant-baseline="central">AS</text>
  <circle cx="120" cy="40" r="5" fill="#5eead4">
    <animate attributeName="opacity" values="1;0.3;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</svg>
